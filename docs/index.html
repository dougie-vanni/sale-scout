<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SaleScout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBFAF7; --ink:#1C2B45; --oxford:#C7D6E8; --cream:#F2EDDF;
    --green:#2F5240; --brick:#8E3B2E; --brass:#9A7B3F; --rule:#D9D4C8;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--paper);color:var(--ink);font-family:'EB Garamond',serif;font-size:18px}
  /* university-stripe ribbon */
  header{
    background:repeating-linear-gradient(90deg,
      var(--ink) 0 10px, var(--paper) 10px 14px,
      var(--oxford) 14px 24px, var(--paper) 24px 28px);
    padding:34px 0 0;
  }
  .masthead{background:var(--paper);border-top:1px solid var(--rule);
    padding:14px 20px;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
  h1{font-weight:600;font-size:30px;letter-spacing:.5px}
  h1 em{font-style:italic;font-weight:400}
  .sub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--brass);
    text-transform:uppercase;letter-spacing:.14em}
  nav{display:flex;gap:4px;padding:0 20px;border-bottom:1px solid var(--rule)}
  nav button{font-family:'IBM Plex Mono',monospace;font-size:13px;background:none;
    border:none;border-bottom:3px solid transparent;padding:12px 14px;cursor:pointer;
    color:var(--ink);letter-spacing:.06em}
  nav button[aria-selected="true"]{border-bottom-color:var(--ink);font-weight:500}
  nav button:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
  main{max-width:1180px;margin:0 auto;padding:26px 20px 80px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:22px}
  .card{background:#fff;border:1px solid var(--rule);display:flex;flex-direction:column}
  .card img{width:100%;aspect-ratio:4/5;object-fit:cover;background:var(--cream)}
  .body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1}
  .vendor{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;
    letter-spacing:.16em;color:var(--brass)}
  .title{font-size:19px;line-height:1.25}
  .meta{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#5b6577}
  .priceline{font-family:'IBM Plex Mono',monospace;font-size:14px;margin-top:auto}
  .priceline s{color:#9aa0ad;margin-left:8px}
  .landed{font-size:12px;color:#5b6577}
  .chip{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:12px;
    background:var(--ink);color:var(--paper);padding:3px 9px;margin-left:8px}
  .reason{font-style:italic;font-size:14px;color:#5b6577}
  .actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
  .actions button{font-family:'IBM Plex Mono',monospace;font-size:12px;padding:9px 4px;
    cursor:pointer;border:1.5px solid;background:none;letter-spacing:.04em}
  .b-want{border-color:var(--green);color:var(--green)}
  .b-want:hover{background:var(--green);color:#fff}
  .b-pass{border-color:var(--brick);color:var(--brick)}
  .b-pass:hover{background:var(--brick);color:#fff}
  .b-cheap{border-color:var(--ink);color:var(--ink)}
  .b-cheap:hover{background:var(--ink);color:#fff}
  .mute{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#9aa0ad;
    background:none;border:none;cursor:pointer;margin-top:8px;text-align:left;
    text-decoration:underline;padding:0}
  .empty{padding:70px 20px;text-align:center;font-style:italic;color:#5b6577}
  .controls{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .cbtn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;
    border:1.5px solid var(--ink);color:var(--ink);background:none;
    padding:6px 10px;cursor:pointer}
  .cbtn:disabled{opacity:.45;cursor:default}
  .cbtn.on{border-color:var(--green);color:var(--green)}
  .cbtn.off{border-color:var(--brick);color:var(--brick)}
  .empty .sub{display:block;margin-top:10px}
  @media (prefers-reduced-motion:no-preference){
    .card{transition:transform .12s ease}
    .card:hover{transform:translateY(-2px)}
  }
</style>
</head>
<body>
<header><div class="masthead">
  <h1>SaleScout <em>&middot; gentleman&rsquo;s outfitting, discounted</em></h1>
  <span class="sub" id="count"></span>
  <div class="controls" id="controls" hidden>
    <button class="cbtn" id="c-toggle"></button>
    <button class="cbtn" id="c-run"></button>
    <button class="cbtn" id="c-stop"></button>
  </div>
</div></header>
<nav role="tablist">
  <button role="tab" data-tab="new" aria-selected="true">New</button>
  <button role="tab" data-tab="approved" aria-selected="false">Saved</button>
  <button role="tab" data-tab="rejected" aria-selected="false">Passed</button>
  <button role="tab" data-tab="too_expensive" aria-selected="false">Waiting on price</button>
</nav>
<main><div class="grid" id="grid"></div><div class="empty" id="empty" hidden></div></main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// ── EDIT THESE TWO LINES AFTER CREATING YOUR SUPABASE PROJECT ──
const SUPABASE_URL = 'https://gdckdtllocrkbilzyezv.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_bT9n8zytHkA4ZIYhyUwlzg_Wv_9-Buq';
// ───────────────────────────────────────────────────────────────

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const count = document.getElementById('count');
let tab = 'new';

const aud = n => 'A$' + Number(n).toFixed(0);

async function load() {
  grid.innerHTML = ''; empty.hidden = true;
  const { data, error } = await sb.from('items').select('*')
    .eq('status', tab).order('landed_discount_pct', { ascending: false }).limit(200);
  if (error) { empty.textContent = 'Could not load items: ' + error.message; empty.hidden = false; return; }
  count.textContent = `${data.length} item${data.length === 1 ? '' : 's'}`;
  if (!data.length) {
    empty.innerHTML = tab === 'new'
      ? 'Nothing new today. The sweep runs each morning.<span class="sub">check back tomorrow</span>'
      : 'Nothing here yet.';
    empty.hidden = false; return;
  }
  for (const it of data) grid.appendChild(card(it));
}

function card(it) {
  const el = document.createElement('article');
  el.className = 'card';
  el.innerHTML = `
    ${it.image ? `<a href="${it.url}" target="_blank" rel="noopener"><img src="${it.image}" alt="" loading="lazy"></a>` : ''}
    <div class="body">
      <span class="vendor">${esc(it.vendor || it.retailer_name)}</span>
      <a class="title" href="${it.url}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">${esc(it.title)}</a>
      <span class="meta">${esc(it.variant_title)} &middot; ${esc(it.retailer_name)} (${it.region})</span>
      <div class="priceline">${aud(it.landed_aud)}<s>${aud(it.landed_full_aud)}</s>
        <span class="chip">&minus;${Math.round(it.landed_discount_pct * 100)}%</span></div>
      <span class="landed">landed: item ${aud(it.price_aud)} + ship ${aud(it.shipping_aud)}${it.gst_aud > 0 ? ' + GST ' + aud(it.gst_aud) : ''}</span>
      ${it.score_reason ? `<span class="reason">${esc(it.score_reason)}</span>` : ''}
      ${tab === 'new' ? `
      <div class="actions">
        <button class="b-want">Want it</button>
        <button class="b-pass">Pass</button>
        <button class="b-cheap">Cheaper</button>
      </div>
      <button class="mute">Mute ${esc(it.retailer_name)}</button>` : ''}
    </div>`;
  if (tab === 'new') {
    el.querySelector('.b-want').onclick = () => verdict(it, 'approved', el);
    el.querySelector('.b-pass').onclick = () => verdict(it, 'rejected', el);
    el.querySelector('.b-cheap').onclick = () => verdict(it, 'too_expensive', el);
    el.querySelector('.mute').onclick = () => muteRetailer(it);
  }
  return el;
}

async function verdict(it, status, el) {
  const { error } = await sb.from('items').update({ status }).eq('item_key', it.item_key);
  if (error) { alert('Update failed: ' + error.message); return; }
  el.remove();
  const n = grid.children.length;
  count.textContent = `${n} item${n === 1 ? '' : 's'}`;
  if (!n) load();
}

async function muteRetailer(it) {
  if (!confirm(`Mute ${it.retailer_name}? It will be skipped in future sweeps.`)) return;
  const { error } = await sb.from('muted_retailers').upsert({ retailer_id: it.retailer_id });
  if (error) { alert('Mute failed: ' + error.message); return; }
  load();
}

const esc = s => String(s ?? '').replace(/[&<>"']/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

document.querySelectorAll('nav button').forEach(b => b.onclick = () => {
  document.querySelectorAll('nav button').forEach(x => x.setAttribute('aria-selected', 'false'));
  b.setAttribute('aria-selected', 'true');
  tab = b.dataset.tab; load();
});

// ── sweep controls (control table in Supabase) ──
const controlsEl = document.getElementById('controls');
async function loadControls() {
  const { data, error } = await sb.from('control').select('key,value');
  if (error || !data || !data.length) { controlsEl.hidden = true; return; }
  controlsEl.hidden = false;
  const c = Object.fromEntries(data.map(r => [r.key, r.value]));
  const t = document.getElementById('c-toggle');
  t.textContent = 'Daily sweeps: ' + (c.sweeps_enabled ? 'ON' : 'OFF');
  t.className = 'cbtn ' + (c.sweeps_enabled ? 'on' : 'off');
  t.onclick = () => setFlag('sweeps_enabled', !c.sweeps_enabled);
  const r = document.getElementById('c-run');
  if (c.run_requested) {
    r.textContent = 'Sweep queued\u2026'; r.disabled = true; r.onclick = null;
    r.title = 'Starts within ~15 minutes';
  } else {
    r.textContent = 'Sweep now'; r.disabled = false;
    r.onclick = () => setFlag('run_requested', true);
  }
  const st = document.getElementById('c-stop');
  if (c.stop_requested) {
    st.textContent = 'Stopping\u2026 (click to cancel)';
    st.onclick = () => setFlag('stop_requested', false);
  } else {
    st.textContent = 'Stop sweep';
    st.onclick = () => setFlag('stop_requested', true);
  }
}
async function setFlag(key, value) {
  const { error } = await sb.from('control')
    .update({ value, updated_at: new Date().toISOString() }).eq('key', key);
  if (error) alert('Failed: ' + error.message);
  loadControls();
}

load();
loadControls();
setInterval(loadControls, 30000);
</script>
</body>
</html>
