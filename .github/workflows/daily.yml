name: daily-sweep

on:
  schedule:
    - cron: "*/15 * * * *"   # poll: has the website requested a sweep?
    - cron: "0 20 * * *"     # daily 6am AEST sweep (only if enabled on website)
  workflow_dispatch:
    inputs:
      probe_only:
        description: "Run feed probe instead of the sweep"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Decide whether to run
        id: decide
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EVENT: ${{ github.event_name }}
          CRON: ${{ github.event.schedule }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          url = os.environ["SUPABASE_URL"].rstrip("/")
          if url.endswith("/rest/v1"):
              url = url[: -len("/rest/v1")]
          key = os.environ["KEY"]
          hdrs = {"apikey": key, "Authorization": f"Bearer {key}",
                  "Content-Type": "application/json"}
          def req(method, path, body=None):
              r = urllib.request.Request(url + path, method=method, headers=hdrs,
                  data=json.dumps(body).encode() if body else None)
              with urllib.request.urlopen(r, timeout=30) as resp:
                  return resp.read()
          event, cron = os.environ["EVENT"], os.environ.get("CRON", "")
          run, why = "no", "poll: nothing requested"
          if event == "workflow_dispatch":
              run, why = "yes", "manual or instant dispatch"
              try:
                  req("PATCH", "/rest/v1/control?key=eq.run_requested", {"value": False})
              except Exception:
                  pass
          else:
              try:
                  flags = {x["key"]: x["value"] for x in
                           json.loads(req("GET", "/rest/v1/control?select=key,value"))}
              except Exception as e:
                  flags, why = {}, f"control table unreadable ({e}); skipping"
              if flags.get("run_requested"):
                  req("PATCH", "/rest/v1/control?key=eq.run_requested", {"value": False})
                  run, why = "yes", "website Sweep-now request"
              elif cron == "0 20 * * *":
                  if flags.get("sweeps_enabled"):
                      run, why = "yes", "daily schedule (sweeps enabled)"
                  else:
                      why = "daily schedule, but sweeps are OFF on website"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"run={run}\n")
          print(f"decision: {why}")
          PY
      - uses: actions/setup-python@v5
        if: steps.decide.outputs.run == 'yes'
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
        if: steps.decide.outputs.run == 'yes'
      - name: Probe feeds
        if: steps.decide.outputs.run == 'yes' && inputs.probe_only
        run: python -m scout.probe
      - name: Run sweep
        if: steps.decide.outputs.run == 'yes' && !inputs.probe_only
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -o pipefail
          rc=0
          timeout 1380 python -m scout.main 2>&1 | tee sweep-log.txt || rc=$?
          { echo "exit_code=$rc"; echo "--- last 60 lines ---"; tail -60 sweep-log.txt; } > sweep-status.txt
          rm sweep-log.txt
          git config user.name "sweep-bot"
          git config user.email "sweep-bot@users.noreply.github.com"
          git pull --rebase || true
          git add sweep-status.txt
          git commit -m "Sweep status $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
          git push || true
          exit $rc
