name: sweep-on-push

on:
  push:
    paths:
      - ".sweep-trigger"

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run sweep and commit status
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -o pipefail
          rc=0
          python -m scout.main 2>&1 | tee sweep-log.txt || rc=$?
          { echo "exit_code=$rc"; echo "--- last 80 lines ---"; tail -80 sweep-log.txt; } > sweep-status.txt
          rm sweep-log.txt
          git config user.name "sweep-bot"
          git config user.email "sweep-bot@users.noreply.github.com"
          git pull --rebase || true
          git add sweep-status.txt
          git commit -m "Sweep status $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
          exit $rc
