name: probe-on-push

on:
  push:
    paths:
      - "config/retailers.json"
      - ".github/workflows/probe-on-push.yml"

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Probe feeds and commit results
        run: |
          python -m scout.probe | tee probe-results.txt
          git config user.name "probe-bot"
          git config user.email "probe-bot@users.noreply.github.com"
          git add probe-results.txt
          git commit -m "Probe results $(date -u +%Y-%m-%dT%H:%M:%SZ)" || exit 0
          git push
