<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SaleScout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBFAF7; --ink:#1C2B45; --oxford:#C7D6E8; --cream:#F2EDDF;
    --green:#2F5240; --brick:#8E3B2E; --brass:#9A7B3F; --rule:#D9D4C8;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--paper);color:var(--ink);font-family:'EB Garamond',serif;font-size:18px}
  /* university-stripe ribbon */
  header{
    background:repeating-linear-gradient(90deg,
      var(--ink) 0 10px, var(--paper) 10px 14px,
      var(--oxford) 14px 24px, var(--paper) 24px 28px);
    padding:34px 0 0;
  }
  .masthead{background:var(--paper);border-top:1px solid var(--rule);
    padding:14px 20px;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
  h1{font-weight:600;font-size:30px;letter-spacing:.5px}
  h1 em{font-style:italic;font-weight:400}
  .sub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--brass);
    text-transform:uppercase;letter-spacing:.14em}
  nav{display:flex;gap:4px;padding:0 20px;border-bottom:1px solid var(--rule)}
  nav button{font-family:'IBM Plex Mono',monospace;font-size:13px;background:none;
    border:none;border-bottom:3px solid transparent;padding:12px 14px;cursor:pointer;
    color:var(--ink);letter-spacing:.06em}
  nav button[aria-selected="true"]{border-bottom-color:var(--ink);font-weight:500}
  nav button:focus-visible, .filter-chip:focus-visible, .clear-all:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
  .filterbar{max-width:1180px;margin:0 auto;padding:12px 20px 0;display:flex;gap:12px;
    align-items:center;justify-content:space-between;flex-wrap:wrap}
  .filters{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .filter-chip{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;
    letter-spacing:.10em;border:1px solid var(--rule);background:none;color:var(--ink);
    padding:6px 8px;cursor:pointer}
  .filter-chip[aria-pressed="true"]{border-color:var(--ink);background:var(--cream);font-weight:500}
  .filter-chip .n{color:var(--brass);margin-left:4px}
  .clear-all{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;
    letter-spacing:.10em;border:1.5px solid var(--brick);color:var(--brick);background:none;
    padding:7px 10px;cursor:pointer}
  .clear-all:disabled{opacity:.45;cursor:default}
  main{max-width:1180px;margin:0 auto;padding:26px 20px 80px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:22px}
  .card{background:#fff;border:1px solid var(--rule);display:flex;flex-direction:column}
  .card img{width:100%;aspect-ratio:4/5;object-fit:cover;background:var(--cream)}
  .body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1}
  .vendor{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;
    letter-spacing:.16em;color:var(--brass)}
  .title{font-size:19px;line-height:1.25}
  .meta{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#5b6577}
  .priceline{font-family:'IBM Plex Mono',monospace;font-size:14px;margin-top:auto}
  .priceline s{color:#9aa0ad;margin-left:8px}
  .landed{font-size:12px;color:#5b6577}
  .chip{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:12px;
    background:var(--ink);color:var(--paper);padding:3px 9px;margin-left:8px}
  .reason{font-style:italic;font-size:14px;color:#5b6577}
  .actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
  .actions button{font-family:'IBM Plex Mono',monospace;font-size:12px;padding:9px 4px;
    cursor:pointer;border:1.5px solid;background:none;letter-spacing:.04em}
  .b-want{border-color:var(--green);color:var(--green)}
  .b-want:hover{background:var(--green);color:#fff}
  .b-pass{border-color:var(--brick);color:var(--brick)}
  .b-pass:hover{background:var(--brick);color:#fff}
  .b-cheap{border-color:var(--ink);color:var(--ink)}
  .b-cheap:hover{background:var(--ink);color:#fff}
  .mute{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#9aa0ad;
    background:none;border:none;cursor:pointer;margin-top:8px;text-align:left;
    text-decoration:underline;padding:0}
  .empty{padding:70px 20px;text-align:center;font-style:italic;color:#5b6577}
  .controls{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .cbtn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;
    border:1.5px solid var(--ink);color:var(--ink);background:none;
    padding:6px 10px;cursor:pointer}
  .cbtn:disabled{opacity:.45;cursor:default}
  .cbtn.on{border-color:var(--green);color:var(--green)}
  .cbtn.off{border-color:var(--brick);color:var(--brick)}
  .state{display:inline-flex;align-items:center;gap:7px}
  .state .dot{width:9px;height:9px;border-radius:50%;background:#9aa0ad;display:inline-block}
  .state.running .dot{background:var(--green);animation:pulse 1.2s ease-in-out infinite}
  .state.stopped .dot,.state.stalled .dot{background:var(--brick)}
  @keyframes pulse{50%{opacity:.35}}
  /* settings */
  #settings{display:flex;flex-direction:column;gap:34px;max-width:880px}
  #settings[hidden]{display:none}
  #settings h2{font-size:22px;font-weight:600;border-bottom:1px solid var(--rule);padding-bottom:6px;margin-bottom:14px}
  .rtable{width:100%;border-collapse:collapse;font-size:15px}
  .rtable td,.rtable th{padding:7px 8px;border-bottom:1px solid var(--rule);text-align:left;vertical-align:middle}
  .rtable th{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--brass)}
  .rtable .url{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#5b6577;word-break:break-all}
  .rtable .off-row td{opacity:.45}
  .xbtn{background:none;border:none;color:var(--brick);cursor:pointer;font-size:15px}
  .sw{cursor:pointer}
  .frow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:center}
  .frow input,.frow select,#settings textarea,.sizes input{
    font-family:'IBM Plex Mono',monospace;font-size:13px;padding:8px;border:1px solid var(--rule);
    background:#fff;color:var(--ink)}
  #settings textarea{width:100%;min-height:130px;line-height:1.5}
  .sizes{display:grid;grid-template-columns:120px 1fr;gap:10px;align-items:center}
  .sizes label{font-family:'IBM Plex Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:.1em}
  .sizes input{width:100%}
  .savebtn{font-family:'IBM Plex Mono',monospace;font-size:13px;padding:10px 18px;cursor:pointer;
    border:1.5px solid var(--green);color:var(--green);background:none;margin-top:14px;align-self:flex-start}
  .savebtn:hover{background:var(--green);color:#fff}
  .savedmsg{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--green);margin-left:12px}
  /* modal */
  #modal-bg{position:fixed;inset:0;background:rgba(28,43,69,.45);display:flex;
    align-items:center;justify-content:center;z-index:50}
  #modal{background:var(--paper);border:1px solid var(--rule);max-width:440px;width:92%;
    padding:26px 28px;box-shadow:0 8px 40px rgba(0,0,0,.25)}
  #modal p{margin-bottom:18px;line-height:1.5;white-space:pre-line}
  #modal input{width:100%;font-family:'IBM Plex Mono',monospace;font-size:14px;
    padding:9px;border:1px solid var(--rule);margin-bottom:18px}
  #modal .mrow{display:flex;gap:10px;justify-content:flex-end}
  #modal button{font-family:'IBM Plex Mono',monospace;font-size:13px;padding:9px 16px;
    cursor:pointer;border:1.5px solid var(--ink);background:none;color:var(--ink)}
  #modal button.primary{background:var(--ink);color:var(--paper)}
  .empty .sub{display:block;margin-top:10px}
  @media (prefers-reduced-motion:no-preference){
    .card{transition:transform .12s ease}
    .card:hover{transform:translateY(-2px)}
  }
</style>
</head>
<body>
<header><div class="masthead">
  <h1>SaleScout <em>&middot; gentleman&rsquo;s outfitting, discounted</em></h1>
  <span class="sub" id="count"></span>
  <span class="sub state" id="sweepstate"><span class="dot"></span><span id="sweepstate-t">&hellip;</span></span>
  <div class="controls" id="controls" hidden>
    <button class="cbtn" id="c-toggle"></button>
    <button class="cbtn" id="c-run"></button>
    <button class="cbtn" id="c-stop"></button>
    <button class="cbtn off" id="c-reset">Reset&hellip;</button>
  </div>
</div></header>
<nav role="tablist">
  <button role="tab" data-tab="new" aria-selected="true">New</button>
  <button role="tab" data-tab="approved" aria-selected="false">Saved</button>
  <button role="tab" data-tab="rejected" aria-selected="false">Passed</button>
  <button role="tab" data-tab="too_expensive" aria-selected="false">Waiting on price</button>
  <button role="tab" data-tab="settings" aria-selected="false">Settings</button>
</nav>
<div class="filterbar">
  <div class="filters" id="category-filters" aria-label="Filter by garment type"></div>
  <button class="clear-all" id="clear-all" hidden>Clear all</button>
</div>
<main><div class="grid" id="grid"></div><div class="empty" id="empty" hidden></div>
<div id="settings" hidden></div></main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// ── EDIT THESE TWO LINES AFTER CREATING YOUR SUPABASE PROJECT ──
const SUPABASE_URL = 'https://gdckdtllocrkbilzyezv.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_bT9n8zytHkA4ZIYhyUwlzg_Wv_9-Buq';
// ───────────────────────────────────────────────────────────────

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const count = document.getElementById('count');
const filterEl = document.getElementById('category-filters');
const clearAllBtn = document.getElementById('clear-all');
const categories = [
  ['all', 'All'], ['shirts', 'Shirts'], ['trousers', 'Trousers'],
  ['sweaters', 'Sweaters'], ['outerwear', 'Outerwear'], ['shoes', 'Shoes'], ['belts', 'Belts']
].map(([value, label]) => ({ value, label }));
const categoryLabels = Object.fromEntries(categories.map(c => [c.value, c.label]));
let tab = 'new';
let categoryFilter = 'all';
let currentTotal = 0;
let categoryCounts = null;

const aud = n => 'A$' + Number(n).toFixed(0);

async function load() {
  if (tab === 'settings') {
    grid.innerHTML = ''; empty.hidden = true; count.textContent = '';
    settingsEl.hidden = false; loadSettings(); return;
  }
  settingsEl.hidden = true;
  grid.innerHTML = ''; empty.hidden = true;
  currentTotal = 0; updateClearAll();
  let query = sb.from('items').select('*', { count: 'exact' }).eq('status', tab);
  if (categoryFilter !== 'all') query = query.eq('category', categoryFilter);
  const [{ data, error, count: total }] = await Promise.all([
    query.order('landed_discount_pct', { ascending: false }).limit(200),
    loadCategoryCounts()
  ]);
  if (error) { empty.textContent = 'Could not load items: ' + error.message; empty.hidden = false; return; }
  currentTotal = total ?? data.length;
  updateClearAll();
  count.textContent = data.length === currentTotal
    ? `${currentTotal} item${currentTotal === 1 ? '' : 's'}`
    : `${data.length} of ${currentTotal} items`;
  if (!data.length) {
    empty.innerHTML = categoryFilter === 'all' && tab === 'new'
      ? 'Nothing new today. The sweep runs each morning.<span class="sub">check back tomorrow</span>'
      : 'Nothing here yet.';
    empty.hidden = false; return;
  }
  for (const it of data) grid.appendChild(card(it));
}

function card(it) {
  const el = document.createElement('article');
  el.className = 'card';
  el.innerHTML = `
    ${it.image ? `<a href="${it.url}" target="_blank" rel="noopener"><img src="${it.image}" alt="" loading="lazy"></a>` : ''}
    <div class="body">
      <span class="vendor">${esc(it.vendor || it.retailer_name)}</span>
      <a class="title" href="${it.url}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">${esc(it.title)}</a>
      <span class="meta">${esc(it.variant_title)} &middot; ${esc(it.retailer_name)} (${it.region})</span>
      <div class="priceline">${aud(it.landed_aud)}<s>${aud(it.landed_full_aud)}</s>
        <span class="chip">&minus;${Math.round(it.landed_discount_pct * 100)}%</span></div>
      <span class="landed">landed: item ${aud(it.price_aud)} + ship ${aud(it.shipping_aud)}${it.gst_aud > 0 ? ' + GST ' + aud(it.gst_aud) : ''}</span>
      ${it.score_reason ? `<span class="reason">${esc(it.score_reason)}</span>` : ''}
      ${tab === 'new' ? `
      <div class="actions">
        <button class="b-want">Want it</button>
        <button class="b-pass">Pass</button>
        <button class="b-cheap">Cheaper</button>
      </div>
      <button class="mute">Mute ${esc(it.retailer_name)}</button>` : ''}
    </div>`;
  if (tab === 'new') {
    el.querySelector('.b-want').onclick = () => verdict(it, 'approved', el);
    el.querySelector('.b-pass').onclick = () => verdict(it, 'rejected', el);
    el.querySelector('.b-cheap').onclick = () => verdict(it, 'too_expensive', el);
    el.querySelector('.mute').onclick = () => muteRetailer(it);
  }
  return el;
}

function renderCategoryFilters() {
  filterEl.innerHTML = categories.map(c => {
    const n = categoryCounts && Number.isFinite(categoryCounts[c.value])
      ? `<span class="n">${categoryCounts[c.value]}</span>` : '';
    return `<button class="filter-chip" data-category="${esc(c.value)}" aria-pressed="${categoryFilter === c.value ? 'true' : 'false'}">${esc(c.label)}${n}</button>`;
  }).join('');
  filterEl.querySelectorAll('button').forEach(b => b.onclick = () => {
    categoryFilter = b.dataset.category;
    renderCategoryFilters();
    load();
  });
}

async function loadCategoryCounts() {
  const { data, error, count: total } = await sb.from('items')
    .select('category', { count: 'exact' }).eq('status', tab).limit(10000);
  if (error || !data) { categoryCounts = null; renderCategoryFilters(); return; }
  const counts = Object.fromEntries(categories.map(c => [c.value, 0]));
  counts.all = total ?? data.length;
  if (counts.all === data.length) {
    for (const row of data) if (counts[row.category] !== undefined) counts[row.category] += 1;
    categoryCounts = counts;
  } else {
    categoryCounts = { all: counts.all };
  }
  renderCategoryFilters();
}

function updateClearAll() {
  const canClear = tab === 'new' || tab === 'too_expensive';
  clearAllBtn.hidden = !canClear;
  clearAllBtn.disabled = !canClear || currentTotal === 0;
}

async function clearAll() {
  const targetTab = tab;
  const targetCategory = categoryFilter;
  const total = currentTotal;
  if ((targetTab !== 'new' && targetTab !== 'too_expensive') || total === 0) return;
  const tabLabel = targetTab === 'too_expensive' ? 'Waiting on price' : 'New';
  const itemWord = total === 1 ? 'item' : 'items';
  const scope = targetCategory === 'all'
    ? `${total} ${itemWord} from the ${tabLabel} tab`
    : `${total} ${itemWord} from ${categoryLabels[targetCategory]} in the ${tabLabel} tab`;
  if (!await uiConfirm(`Clear ${scope}? This marks them as Passed, not deleted.`)) return;
  let query = sb.from('items').update({ status: 'rejected' }).eq('status', targetTab);
  if (targetCategory !== 'all') query = query.eq('category', targetCategory);
  const { error } = await query;
  if (error) { uiAlert('Clear all failed: ' + error.message); return; }
  load();
}

async function verdict(it, status, el) {
  const { error } = await sb.from('items').update({ status }).eq('item_key', it.item_key);
  if (error) { uiAlert('Update failed: ' + error.message); return; }
  load();
}

async function muteRetailer(it) {
  if (!await uiConfirm(`Mute ${it.retailer_name}? It will be skipped in future sweeps.`)) return;
  const { error } = await sb.from('muted_retailers').upsert({ retailer_id: it.retailer_id });
  if (error) { uiAlert('Mute failed: ' + error.message); return; }
  load();
}

const esc = s => String(s ?? '').replace(/[&<>"']/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

document.querySelectorAll('nav button').forEach(b => b.onclick = () => {
  document.querySelectorAll('nav button').forEach(x => x.setAttribute('aria-selected', 'false'));
  b.setAttribute('aria-selected', 'true');
  tab = b.dataset.tab; load();
});
clearAllBtn.onclick = clearAll;
renderCategoryFilters();

// ── modal dialogs (replace prompt/confirm/alert) ──
function modal({ msg, input = false, okText = 'OK', cancel = true }) {
  return new Promise(res => {
    const bg = document.createElement('div'); bg.id = 'modal-bg';
    bg.innerHTML = `<div id="modal"><p></p>${input ? '<input type="text">' : ''}
      <div class="mrow">${cancel ? '<button class="m-cancel">Cancel</button>' : ''}
      <button class="primary m-ok"></button></div></div>`;
    bg.querySelector('p').textContent = msg;
    bg.querySelector('.m-ok').textContent = okText;
    const inp = bg.querySelector('input');
    const done = v => { bg.remove(); res(v); };
    bg.querySelector('.m-ok').onclick = () => done(input ? (inp.value ?? '') : true);
    if (cancel) bg.querySelector('.m-cancel').onclick = () => done(input ? null : false);
    bg.onclick = e => { if (e.target === bg && cancel) done(input ? null : false); };
    if (input) inp.onkeydown = e => { if (e.key === 'Enter') done(inp.value); };
    document.body.appendChild(bg);
    (input ? inp : bg.querySelector('.m-ok')).focus();
  });
}
const uiAlert  = m => modal({ msg: m, cancel: false });
const uiConfirm = m => modal({ msg: m });
const uiPrompt = m => modal({ msg: m, input: true });

// ── sweep status badge ──
async function loadStatus() {
  const { data } = await sb.from('sweep_status').select('*').eq('id', 1).maybeSingle();
  const el = document.getElementById('sweepstate');
  const t = document.getElementById('sweepstate-t');
  if (!data) { el.style.display = 'none'; return; }
  el.style.display = '';
  const ageMin = (Date.now() - new Date(data.updated_at).getTime()) / 60000;
  let cls = data.state, txt = '';
  if (data.state === 'running' && ageMin > 25) {
    cls = 'stalled'; txt = 'sweep stalled? no heartbeat for ' + Math.round(ageMin) + 'm';
  } else if (data.state === 'running') {
    txt = 'sweeping: ' + (data.detail || '\u2026');
  } else if (data.state === 'stopped') {
    txt = 'sweep stopped \u2014 ' + (data.detail || '');
  } else {
    txt = 'idle \u2014 last sweep: ' + (data.detail || 'never');
  }
  el.className = 'sub state ' + cls;
  t.textContent = txt;
}

// ── settings panel ──
const CATS = ['shirts', 'trousers', 'sweaters', 'belts', 'outerwear', 'shoes'];
const settingsEl = document.getElementById('settings');
const slug = n => n.toLowerCase().replace(/[^a-z0-9]+/g, '').slice(0, 24) || ('r' + Date.now());

async function loadSettings() {
  settingsEl.innerHTML = '<div class="empty">Loading\u2026</div>';
  const [r1, r2, r3] = await Promise.all([
    sb.from('retailers').select('*').order('region').order('name'),
    sb.from('preferences').select('value').eq('key', 'main').maybeSingle(),
    sb.from('muted_retailers').select('retailer_id'),
  ]);
  if (r1.error || r2.error || !r2.data) {
    settingsEl.innerHTML = '<div class="empty">Settings tables not found \u2014 run the setup SQL first.</div>';
    return;
  }
  const rets = r1.data, prefs = r2.data.value;
  const muted = new Set((r3.data || []).map(x => x.retailer_id));
  settingsEl.innerHTML = '';

  // — retailers —
  const sec1 = document.createElement('section');
  sec1.innerHTML = '<h2>Retailers</h2>';
  const tbl = document.createElement('table'); tbl.className = 'rtable';
  tbl.innerHTML = '<tr><th>on</th><th>name</th><th>region</th><th>store</th><th></th></tr>';
  for (const r of rets) {
    const tr = document.createElement('tr');
    if (!r.enabled) tr.className = 'off-row';
    tr.innerHTML = `
      <td><input type="checkbox" class="sw" ${r.enabled ? 'checked' : ''}></td>
      <td>${esc(r.name)}${r.type !== 'shopify' ? ' <span class="url">(custom \u2014 not yet supported)</span>' : ''}
        ${muted.has(r.id) ? ' <span class="url">[muted]</span>' : ''}</td>
      <td>${esc(r.region)}</td>
      <td class="url">${esc(r.base_url)}</td>
      <td><button class="xbtn" title="Remove">\u2715</button></td>`;
    tr.querySelector('.sw').onchange = async e => {
      const { error } = await sb.from('retailers').update({ enabled: e.target.checked }).eq('id', r.id);
      if (error) { uiAlert('Failed: ' + error.message); return; }
      loadSettings();
    };
    tr.querySelector('.xbtn').onclick = async () => {
      if (!await uiConfirm(`Remove ${r.name} permanently? (Disabling with the checkbox is reversible.)`)) return;
      const { error } = await sb.from('retailers').delete().eq('id', r.id);
      if (error) { uiAlert('Failed: ' + error.message); return; }
      loadSettings();
    };
    tbl.appendChild(tr);
  }
  sec1.appendChild(tbl);
  const form = document.createElement('div'); form.className = 'frow';
  form.innerHTML = `
    <input id="nr-name" placeholder="Name" style="width:160px">
    <input id="nr-url" placeholder="https://store.com" style="width:220px">
    <select id="nr-region"><option>AU</option><option>US</option><option>CA</option><option>UK</option><option>JP</option><option>EU</option></select>
    <select id="nr-cur"><option>AUD</option><option>USD</option><option>CAD</option><option>GBP</option><option>JPY</option><option>EUR</option></select>
    <input id="nr-ship" type="number" placeholder="ship" title="Shipping cost" style="width:70px">
    <button class="savebtn" style="margin-top:0" id="nr-add">Add</button>`;
  form.querySelector('#nr-add').onclick = async () => {
    const name = form.querySelector('#nr-name').value.trim();
    const url = form.querySelector('#nr-url').value.trim().replace(/\/+$/, '');
    if (!name || !/^https:\/\//.test(url)) { uiAlert('Need a name and a https:// store URL.'); return; }
    const region = form.querySelector('#nr-region').value;
    const ship = parseFloat(form.querySelector('#nr-ship').value) || 0;
    const row = { id: slug(name), name, region, type: 'shopify', base_url: url,
      currency: form.querySelector('#nr-cur').value, enabled: true,
      [region === 'AU' ? 'shipping_aud' : 'shipping_usd']: ship };
    const { error } = await sb.from('retailers').insert(row);
    if (error) { uiAlert('Failed: ' + error.message); return; }
    loadSettings();
  };
  sec1.appendChild(form);
  const hint = document.createElement('p'); hint.className = 'url';
  hint.style.marginTop = '10px';
  hint.textContent = 'Any Shopify store works. Changes apply from the next sweep.';
  sec1.appendChild(hint);
  settingsEl.appendChild(sec1);

  // — sizes & scoring —
  const sec2 = document.createElement('section');
  sec2.innerHTML = '<h2>Sizes</h2>';
  const sg = document.createElement('div'); sg.className = 'sizes';
  for (const c of CATS) {
    const lab = document.createElement('label'); lab.textContent = c;
    const inp = document.createElement('input');
    inp.id = 'sz-' + c; inp.value = (prefs.sizes[c] || []).join(', ');
    sg.appendChild(lab); sg.appendChild(inp);
  }
  sec2.appendChild(sg);
  settingsEl.appendChild(sec2);

  const sec3 = document.createElement('section');
  sec3.innerHTML = `<h2>Style brief &amp; thresholds</h2>
    <textarea id="pf-brief"></textarea>
    <div class="frow">
      <label class="url">min discount core</label><input id="pf-core" type="number" min="0" max="95" style="width:70px">
      <label class="url">% &nbsp; speculative</label><input id="pf-spec" type="number" min="0" max="95" style="width:70px">
      <label class="url">% &nbsp; min score</label><input id="pf-score" type="number" min="0" max="10" style="width:60px">
      <label class="url">max AI calls/run</label><input id="pf-cap" type="number" min="0" style="width:80px">
    </div>
    <div class="frow" style="width:100%">
      <label class="url">blocked brands</label>
      <input id="pf-brands" style="flex:1;min-width:300px" placeholder="nike, adidas, ...">
    </div>
    <button class="savebtn" id="pf-save">Save preferences</button><span class="savedmsg" id="pf-msg"></span>`;
  sec3.querySelector('#pf-brief').value = prefs.style_brief;
  sec3.querySelector('#pf-core').value = Math.round(prefs.discount_thresholds.core * 100);
  sec3.querySelector('#pf-spec').value = Math.round(prefs.discount_thresholds.speculative * 100);
  sec3.querySelector('#pf-score').value = prefs.score_threshold;
  sec3.querySelector('#pf-cap').value = prefs.max_scores_per_run ?? 300;
  sec3.querySelector('#pf-brands').value = (prefs.hard_excludes.vendor_excludes || []).join(', ');
  sec3.querySelector('#pf-save').onclick = async () => {
    const v = structuredClone(prefs);
    for (const c of CATS) {
      v.sizes[c] = document.getElementById('sz-' + c).value
        .split(',').map(x => x.trim()).filter(Boolean);
    }
    v.style_brief = sec3.querySelector('#pf-brief').value.trim();
    v.discount_thresholds.core = (parseFloat(sec3.querySelector('#pf-core').value) || 30) / 100;
    v.discount_thresholds.speculative = (parseFloat(sec3.querySelector('#pf-spec').value) || 50) / 100;
    v.score_threshold = parseInt(sec3.querySelector('#pf-score').value) || 6;
    v.max_scores_per_run = parseInt(sec3.querySelector('#pf-cap').value) || 0;
    v.hard_excludes.vendor_excludes = sec3.querySelector('#pf-brands').value
      .toLowerCase().split(',').map(x => x.trim()).filter(Boolean);
    const { error } = await sb.from('preferences')
      .update({ value: v, updated_at: new Date().toISOString() }).eq('key', 'main');
    const msg = document.getElementById('pf-msg');
    if (error) { uiAlert('Save failed: ' + error.message); return; }
    msg.textContent = 'saved \u2713'; setTimeout(() => msg.textContent = '', 2500);
  };
  settingsEl.appendChild(sec3);
}

// ── sweep controls (control table in Supabase) ──
const controlsEl = document.getElementById('controls');
async function loadControls() {
  const { data, error } = await sb.from('control').select('key,value');
  if (error || !data || !data.length) { controlsEl.hidden = true; return; }
  controlsEl.hidden = false;
  const c = Object.fromEntries(data.map(r => [r.key, r.value]));
  const t = document.getElementById('c-toggle');
  t.textContent = 'Daily sweeps: ' + (c.sweeps_enabled ? 'ON' : 'OFF');
  t.className = 'cbtn ' + (c.sweeps_enabled ? 'on' : 'off');
  t.onclick = () => setFlag('sweeps_enabled', !c.sweeps_enabled);
  const r = document.getElementById('c-run');
  if (c.run_requested) {
    r.textContent = 'Sweep queued\u2026'; r.disabled = true; r.onclick = null;
    r.title = 'Starts within ~15 minutes';
  } else {
    r.textContent = 'Sweep now'; r.disabled = false;
    r.onclick = () => setFlag('run_requested', true);
  }
  const st = document.getElementById('c-stop');
  if (c.stop_requested) {
    st.textContent = 'Stopping\u2026 (click to cancel)';
    st.onclick = () => setFlag('stop_requested', false);
  } else {
    st.textContent = 'Stop sweep';
    st.onclick = () => setFlag('stop_requested', true);
  }
}
document.getElementById('c-reset').onclick = async () => {
  const phrase = 'reset';
  const typed = await uiPrompt(
    'This deletes EVERY item except your Saved ones, so the next sweep '
    + 'rebuilds from scratch with current filters (costs some scoring credit).\n\n'
    + `Type "${phrase}" to confirm:`);
  if (typed !== phrase) return;
  const { error } = await sb.from('items').delete().neq('status', 'approved');
  if (error) { uiAlert('Reset failed: ' + error.message
    + '\n(Have you run the delete-policy SQL?)'); return; }
  load();
};

async function setFlag(key, value) {
  let pw = localStorage.getItem('salescout_pw');
  if (!pw) {
    pw = await uiPrompt('Control password:');
    if (pw === null || pw === '') return;
  }
  const { error } = await sb.rpc('set_control', { k: key, v: value, pw });
  if (error) {
    localStorage.removeItem('salescout_pw');
    uiAlert(/wrong password/i.test(error.message)
      ? 'Wrong password.' : 'Failed: ' + error.message);
  } else {
    localStorage.setItem('salescout_pw', pw);
  }
  loadControls();
}

load();
loadControls();
loadStatus();
setInterval(loadControls, 30000);
setInterval(loadStatus, 10000);
</script>
