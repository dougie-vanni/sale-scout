name: daily-sweep

on:
  schedule:
    - cron: "0 20 * * *"   # 20:00 UTC = 6am AEST / 7am AEDT
  workflow_dispatch:
    inputs:
      probe_only:
        description: "Run feed probe instead of the sweep"
        type: boolean
        default: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Probe feeds
        if: ${{ inputs.probe_only }}
        run: python -m scout.probe
      - name: Run sweep
        if: ${{ !inputs.probe_only }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m scout.main
